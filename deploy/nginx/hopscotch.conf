# Nginx reverse proxy for Hopscotch / FCI Seller — three domains.
#   fciseller.com  (+ www)   -> storefront   (Next.js, 127.0.0.1:3002)
#   admin.fciseller.com      -> admin panel  (Next.js, 127.0.0.1:3001)
#   api.fciseller.com        -> backend API  (Express,  127.0.0.1:5005)
#
# Lives alongside the HRM site (/etc/nginx/sites-enabled/hrm.conf) on the same
# server — no conflict because server_name differs.
#
# TLS (run AFTER the containers are up and DNS resolves):
#   sudo certbot --nginx \
#     -d fciseller.com -d www.fciseller.com \
#     -d admin.fciseller.com \
#     -d api.fciseller.com
#   (certbot rewrites these blocks to add 443 + http->https redirects.)

upstream hopscotch_ecom    { server 127.0.0.1:3002; keepalive 16; }
upstream hopscotch_admin   { server 127.0.0.1:3001; keepalive 16; }
upstream hopscotch_backend { server 127.0.0.1:5005; keepalive 16; }

# ------------------------------ Storefront -----------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name fciseller.com www.fciseller.com;

    client_max_body_size 25m;

    location / {
        proxy_pass http://hopscotch_ecom;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}

# ------------------------------ Admin panel ----------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name admin.fciseller.com;

    client_max_body_size 25m;

    location / {
        proxy_pass http://hopscotch_admin;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}

# ------------------------------- Backend API ---------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.fciseller.com;

    client_max_body_size 25m;

    location / {
        proxy_pass http://hopscotch_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
